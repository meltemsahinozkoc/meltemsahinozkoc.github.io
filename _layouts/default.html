<!DOCTYPE HTML>
<html lang="en" data-theme="light">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.name }}</title>
    <meta name="author" content="{{ site.name }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ '/images/favicon/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" type="text/css" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% include clarity.html %}
  </head>

  <body class="{% if page.permalink contains '/foodiaries/' or page.permalink contains '/places/' or page.permalink contains '/food-coffee-map/' %}page-wide{% endif %}{% if page.permalink contains '/places/' %} page-places{% endif %}{% if page.permalink contains '/music/' %} page-music{% endif %}{% if page.permalink contains '/food-coffee-map/' %} page-food-coffee-map{% endif %}">
    {% include site-header.html %}

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light theme">
      <i class="fas fa-moon"></i>
    </button>

    <nav class="page-history-nav" aria-label="History">
      <button type="button" class="page-history-nav__btn" onclick="history.back()" aria-label="Go back" title="Back">
        <i class="fas fa-arrow-left"></i>
      </button>
      <button type="button" class="page-history-nav__btn" onclick="history.forward()" aria-label="Go forward" title="Forward">
        <i class="fas fa-arrow-right"></i>
      </button>
    </nav>

    <div class="page-container">

      <main class="page-main">
        {{ content }}
      </main>

    </div>

    <footer class="page-footer">
      © 2026 Meltem Sahin Ozkoc
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
